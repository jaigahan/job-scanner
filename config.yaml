# Job Scanner Configuration
# Edit this file to add/remove sites and keywords. Commit changes to GitHub.

# Location filter — applied to all searches
location: "Toronto, Ontario, Canada"
location_radius_km: 50

# How many days back to look on each run
lookback_days: 3

# Priority tiers determine scrape frequency:
#   "daily"  = scraped every run
#   "weekly" = scraped only on Mondays (to keep daily runs fast)

# ─────────────────────────────────────────────────────────────────
# Search tracks — JobSpy queries on LinkedIn and Indeed
# Each posting will be tagged with the track label in the sheet
# ─────────────────────────────────────────────────────────────────
tracks:
  higher_ed:
    label: "Higher Ed / Nonprofit Research Enablement"
    keywords:
      - "research officer"
      - "research facilitator"
      - "research coordinator"
      - "research associate"
      - "research manager"
      - "grant writer"
      - "grant facilitator"
      - "proposal facilitator"
      - "research development officer"
      - "knowledge mobilization"
      - "knowledge translation"
      - "research program manager"
      - "research partnerships"
      - "research engagement"
      - "strategic initiatives research"
      - "research impact"
      - "research strategy"
      - "senior research advisor"

  foundations:
    label: "Foundations / Nonprofits / Policy Organizations"
    keywords:
      - "program officer foundation"
      - "grants manager foundation"
      - "impact and learning"
      - "program manager foundation"
      - "research director"
      - "research manager"
      - "policy analyst nonprofit"
      - "senior advisor nonprofit"
      - "strategic initiatives nonprofit"
      - "strategy and planning nonprofit"
      - "program consultant nonprofit"
      - "policy researcher"
      - "research analyst think tank"
      - "knowledge mobilization nonprofit"

  government:
    label: "Government (Federal / Provincial / Municipal)"
    keywords:
      - "policy advisor"
      - "senior policy advisor"
      - "policy analyst"
      - "senior policy analyst"
      - "program advisor"
      - "senior advisor"
      - "program consultant"
      - "senior program consultant"
      - "strategic policy"
      - "strategy and planning manager"
      - "manager strategic planning"
      - "program manager government"
      - "research analyst government"
      - "knowledge mobilization specialist"

  in_house_research:
    label: "In-House Design Research / Strategy (Corporate)"
    keywords:
      - "design researcher"
      - "UX researcher"
      - "user researcher"
      - "CX researcher"
      - "experience researcher"
      - "insight manager"
      - "customer insights manager"
      - "research strategist"
      - "research strategy corporate"
      - "experience strategy"
      - "innovation strategist"
      - "foresight strategist"
      - "research operations"

